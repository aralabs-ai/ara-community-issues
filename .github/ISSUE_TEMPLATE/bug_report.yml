name: Bug Report
description: Something in ARA Community Edition is not working correctly
labels: ["type: bug", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        > ⚠️ **Security vulnerability?** Do NOT file here. Email [security@aralabs.ai](mailto:security@aralabs.ai) instead.

  - type: input
    id: version
    attributes:
      label: ARA CE Version
      description: Run `ara-server --version` or check your download filename
      placeholder: "e.g. v1.0.2"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux x86_64
        - Linux ARM64
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Docker (linux/amd64)
        - Docker (linux/arm64)
        - Other (describe below)
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of ARA is affected?
      options:
        - Server / Engine
        - Python SDK
        - Java SDK
        - C++ SDK
        - Config / server_config.json
        - Install / packaging
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Minimal steps that reliably reproduce the issue
      placeholder: |
        1. Start server with config …
        2. Call set() with feature …
        3. Call get() …
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Error Output
      description: Paste server logs, SDK error, or stack trace. Wrap in ``` for formatting.
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Server Config (relevant excerpt)
      description: Paste relevant parts of your server_config.json — remove any secrets
      render: json

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else — workaround you found, frequency, environment details
