name: Feature Request
description: Suggest a new capability or improvement for ARA Community Edition
labels: ["type: enhancement", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping shape ARA. Please fill out as much as you can — the more context you give, the faster we can evaluate.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which area does this feature relate to?
      options:
        - Server / Engine
        - Python SDK
        - Java SDK
        - C++ SDK
        - Config / server_config.json
        - Observability / metrics
        - Install / packaging
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve? Why does the current behavior fall short?
      placeholder: "When I do X, I can't Y because Z…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or behaviour change you'd like to see
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use Case / Example
      description: Show a concrete example — pseudocode, config snippet, or written scenario
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you found workarounds? What other approaches did you evaluate?

  - type: dropdown
    id: impact
    attributes:
      label: How important is this to you?
      options:
        - Blocking — I cannot use ARA without this
        - High — significantly impacts my workflow
        - Medium — would meaningfully improve my experience
        - Low — nice-to-have
    validations:
      required: true
